name: Android CI Build

# Jab bhi main/master pe push ho, PR bane, ya "Run workflow" button se manually chalaya jaye
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Project ka koi Gradle Wrapper (gradlew) nahi hai isliye Gradle
      # directly is action se install/run karwa rahe hain â€” sahi Gradle
      # version explicitly bata rahe hain (AGP 9.1.1 ko Gradle 9.3.1+ chahiye)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.3.1'

      # Debug build ke liye debug.keystore chahiye (build.gradle.kts isko
      # rootDir mein dhoondta hai). Yeh file .gitignore mein hai isliye
      # repo mein nahi hai.
      #
      # Firebase email-link (magic link) login App Links verification ke
      # liye is keystore ka SHA-1/SHA-256 fingerprint Firebase console mein
      # register karna padta hai â€” isliye keystore HAR build mein same
      # rehna chahiye (naya keystore = naya fingerprint = link phir se
      # browser mein khulega, app mein nahi).
      #
      # Agar `DEBUG_KEYSTORE_BASE64` repo secret set hai, wahi (fixed)
      # keystore decode karke use karte hain. Pehli baar (secret set nahi
      # hai) ek naya generate karte hain aur is run ke logs mein uska
      # base64 print kar dete hain â€” wahan se copy karke ek naya repo
      # secret (Settings > Secrets and variables > Actions) bana do naam
      # `DEBUG_KEYSTORE_BASE64` se, taaki agli baar se yehi stable rahe.
      - name: Generate or restore debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "Restoring existing debug.keystore from DEBUG_KEYSTORE_BASE64 secret (stable fingerprint)."
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > debug.keystore
          else
            echo "No DEBUG_KEYSTORE_BASE64 secret set - generating a fresh debug.keystore."
            keytool -genkey -v \
              -keystore debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo ""
            echo "======================================================================"
            echo "IMPORTANT (only needed if you use Firebase email-link login):"
            echo "Copy the base64 block below and save it as a new repo secret named"
            echo "DEBUG_KEYSTORE_BASE64 (Settings > Secrets and variables > Actions)."
            echo "This keeps your debug keystore - and its SHA fingerprint below -"
            echo "the same on every future build."
            echo "======================================================================"
            base64 -w 0 debug.keystore
            echo ""
            echo "======================================================================"
          fi

      - name: Print debug keystore SHA fingerprints
        run: |
          echo "Add these under Firebase console > Project settings > your Android app > Add fingerprint:"
          keytool -list -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android \
            | grep -E "SHA1:|SHA256:"

      # Ensure required Android SDK platform/build-tools are present
      # (project uses compileSdk 36.1 / targetSdk 36).
      - name: Install required Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      # GEMINI_API_KEY / YOUTUBE_API_KEY: agar GitHub repo secrets set hain to
      # .env bana denge, warna Secrets Gradle Plugin apne aap .env.example
      # (placeholder) use kar lega, build fail nahi hogi.
      - name: Write .env from repository secrets (optional)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          rm -f .env
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
          fi
          if [ -n "$YOUTUBE_API_KEY" ]; then
            echo "YOUTUBE_API_KEY=$YOUTUBE_API_KEY" >> .env
          fi
          if [ -f .env ]; then
            echo "Wrote .env from repository secrets."
          else
            echo "No secrets set, falling back to .env.example placeholders."
          fi

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: harmonix-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  deploy-hosting:
    name: Deploy assetlinks.json to Firebase Hosting
    runs-on: ubuntu-latest
    # Sirf tabhi chalega jab FIREBASE_SERVICE_ACCOUNT secret set hai - warna
    # skip ho jayega (APK build isse block nahi hota, wo alag job hai).
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # assetlinks.json (public/.well-known/assetlinks.json) ko
      # nirvanamusic-75348.firebaseapp.com/.well-known/assetlinks.json pe
      # deploy karta hai - Android isi file ko fetch karke verify karta hai
      # ki magic-link email ka link is app ke liye hai (App Links). Isà¤•à¥‡
      # bina link hamesha "Site not found" wale browser page pe hi khulega.
      #
      # Setup (ek hi baar): Firebase console > Project settings >
      # Service accounts tab > "Generate new private key" - JSON download
      # hogi, uska pura content copy karke repo secret bana do naam
      # FIREBASE_SERVICE_ACCOUNT se (Settings > Secrets and variables >
      # Actions > New repository secret).
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret set nahi hai - Hosting deploy skip kar rahe hain."
            echo "Magic-link login App Links ke liye ye zaroori hai - README/SETUP_GUIDE.md dekho."
            exit 0
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-service-account.json
          # NOTE: firebase-tools 15.22.2+ has a known CI-auth regression
          # (breaks GOOGLE_APPLICATION_CREDENTIALS-based deploys), so we
          # pin to a version before it rather than using @latest.
          npx --yes firebase-tools@15.22.1 deploy \
            --only hosting \
            --project nirvanamusic-75348 \
            --non-interactive
          rm -f /tmp/firebase-service-account.json
