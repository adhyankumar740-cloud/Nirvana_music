[build]
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

# Exposes the functions at the clean paths the app calls, instead of
# /.netlify/functions/search and /.netlify/functions/resolve.
[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200
  force = true

[[redirects]]
  from = "/api/resolve"
  to = "/.netlify/functions/resolve"
  status = 200
  force = true
